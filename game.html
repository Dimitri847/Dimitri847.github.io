<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Game Loader</title>
<style>
  body {
    margin: 0;
    background: black;
    overflow: hidden;
  }
  iframe {
    width: 100vw;
    height: 100vh;
    border: none;
  }
  #error {
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
    margin-top: 40px;
    font-size: 2rem;
  }
</style>
</head>
<body>

<div id="error"></div>

<script>
  const params = new URLSearchParams(window.location.search);
  const game = params.get("src");

  if (!game) {
    document.getElementById("error").innerText = "No game selected.";
  } else {
    const iframe = document.createElement("iframe");
    iframe.src = "https://3kh0.github.io/" + game + "/";
    document.body.appendChild(iframe);
  }
</script>

</body>
</html>
